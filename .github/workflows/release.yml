name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump type
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          release_type="${{ github.event.inputs.release_type }}"
          if [[ "${release_type}" != "major" && "${release_type}" != "minor" && "${release_type}" != "patch" ]]; then
            echo "Unsupported release_type '${release_type}'. Use major, minor, or patch." >&2
            exit 1
          fi

          latest_tag="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          current_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${current_version}"

          case "${release_type}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"

          if git rev-parse "${next_tag}" >/dev/null 2>&1; then
            echo "Tag ${next_tag} already exists. Choose a different release_type or create a newer base tag first." >&2
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "next_version=${next_version}" >> "${GITHUB_OUTPUT}"
          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify changelog heading
        shell: bash
        run: |
          set -euo pipefail
          next_tag="${{ steps.version.outputs.next_tag }}"
          next_version="${{ steps.version.outputs.next_version }}"

          if ! grep -Eq "^## (${next_tag}|${next_version})([[:space:]]|$|-)" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a heading for this release. Add either '## ${next_tag}' or '## ${next_version}' before releasing." >&2
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          next_tag="${{ steps.version.outputs.next_tag }}"
          git tag -a "${next_tag}" -m "Release ${next_tag}"
          git push origin "${next_tag}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          next_tag="${{ steps.version.outputs.next_tag }}"
          gh release create "${next_tag}" --title "${next_tag}" --generate-notes
